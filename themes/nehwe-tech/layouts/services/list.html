{{ define "main" }}
<section class="page-header">
  <div class="wrap">
    <p class="eyebrow">// services</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-lede">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="prose-section">
  <div class="wrap">
    <div class="service-grid">
      {{ range .Pages.ByWeight }}
        {{ partial "service-card.html" . }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
