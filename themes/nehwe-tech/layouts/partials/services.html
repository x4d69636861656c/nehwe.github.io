{{ with .Params.services }}
<section id="services" class="wrap">
  <div class="section-head reveal">
    <div class="eyebrow">{{ .eyebrow }}</div>
    <h2>{{ .heading }}</h2>
    <p>{{ .sub }}</p>
  </div>
  <div class="grid-3">
    {{ range .items }}
    <div class="card reveal">
      <span class="tag">{{ .tag }}</span>
      <h3>{{ .title }}</h3>
      <p>{{ .description }}</p>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
