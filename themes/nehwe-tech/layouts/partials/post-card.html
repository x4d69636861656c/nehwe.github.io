<a href="{{ .Permalink }}" class="post-card">
  <div class="post-meta">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
    {{ with .Params.categories }} · {{ index . 0 }}{{ end }}
  </div>
  <h3>{{ .Title }}</h3>
  <p>{{ .Params.summary | default .Summary | plainify | truncate 120 }}</p>
  <span class="post-link">Read post →</span>
</a>
