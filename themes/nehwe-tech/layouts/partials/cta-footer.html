<section class="cta-band">
  <div class="wrap cta-band-inner">
    <div>
      <p class="eyebrow">// let's talk</p>
      <h2>Tell me what you're building — or what's breaking.</h2>
      <p class="cta-sub">No obligation, no sales call required just to get a quote.</p>
    </div>
    <div class="cta-band-actions">
      <a href="{{ .Site.Params.calendlyUrl }}" class="btn btn-primary" target="_blank" rel="noopener">Book a free discovery call →</a>
      <a href="mailto:{{ .Site.Params.email }}" class="btn btn-ghost">{{ .Site.Params.email }}</a>
    </div>
  </div>
</section>
