<header class="site-header" id="site-header">
  <div class="wrap header-inner">
    <a href="{{ "/" | absURL }}" class="logo" aria-label="{{ .Site.Params.author }} home">
      <span class="logo-dot" aria-hidden="true"></span>nehwe<span class="logo-accent">.tech</span>
    </a>

    <nav class="nav-primary" aria-label="Primary">
      <ul>
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | absURL }}" {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>

    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark and light mode" type="button">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
      </button>
      <a href="{{ "/contact/" | absURL }}" class="btn btn-primary btn-sm">Book a call</a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false" type="button">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <nav class="nav-mobile" id="nav-mobile" aria-label="Mobile">
    <ul>
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL | absURL }}">{{ .Name }}</a></li>
      {{ end }}
      <li><a href="{{ "/contact/" | absURL }}" class="btn btn-primary btn-sm">Book a call</a></li>
    </ul>
  </nav>
</header>
