{{ define "main" }}
<section class="page-header">
  <div class="wrap">
    <p class="eyebrow">// portfolio</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-lede">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="prose-section">
  <div class="wrap">
    <div class="filter-bar" role="group" aria-label="Filter projects by type">
      <button class="filter-btn active" data-filter="all" type="button">All</button>
      <button class="filter-btn" data-filter="Website" type="button">Website</button>
      <button class="filter-btn" data-filter="AI Automation" type="button">AI Automation</button>
      <button class="filter-btn" data-filter="Cybersecurity" type="button">Cybersecurity</button>
    </div>
    <div class="project-grid" id="project-grid">
      {{ range .Pages }}
      <div class="project-item" data-types="{{ delimit .Params.types "," }}">
        {{ partial "project-card.html" . }}
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
