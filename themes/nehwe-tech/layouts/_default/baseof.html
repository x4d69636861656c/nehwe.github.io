<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}" data-theme="{{ if .Site.Params.defaultDarkMode }}dark{{ else }}light{{ end }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  {{ partial "header.html" . }}
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "cta-footer.html" . }}
  {{ partial "footer.html" . }}
  <script src="{{ "js/main.js" | absURL }}" defer></script>
</body>
</html>
