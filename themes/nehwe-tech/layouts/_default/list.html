{{ define "main" }}
<section class="page-header">
  <div class="wrap">
    <p class="eyebrow">// {{ .Title }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-lede">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="prose-section">
  <div class="wrap">
    <div class="post-grid">
      {{ range .Pages }}
        {{ partial "post-card.html" . }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
