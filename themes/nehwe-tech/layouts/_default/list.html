{{ define "main" }}
<section class="wrap" style="padding-top:160px;">
  <div class="section-head reveal visible">
    <div class="eyebrow">// {{ .Section }}</div>
    <h2>{{ .Title }}</h2>
  </div>
  <div class="grid-3">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="card reveal visible" style="display:block;">
      {{ if .Date }}<span class="tag">{{ .Date.Format "Jan 2006" }}</span>{{ end }}
      <h3>{{ .Title }}</h3>
      <p>{{ .Summary }}</p>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
