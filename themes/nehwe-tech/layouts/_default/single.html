{{ define "main" }}
<section class="page-header">
  <div class="wrap">
    <p class="eyebrow">// {{ .Section | default "page" }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-lede">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="prose-section">
  <div class="wrap wrap-narrow prose">
    {{ .Content }}
  </div>
</section>
{{ end }}
